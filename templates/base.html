<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Decision Intelligence{% endblock %} | DecideIQ</title>
  <meta name="description" content="{% block meta_desc %}Compare options and make smarter decisions with AI-powered analysis. Get ranked recommendations with scores, risks, and confidence levels.{% endblock %}">

  <!-- OG Tags -->
  <meta property="og:title" content="{% block og_title %}DecideIQ — AI-Powered Decision Intelligence{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Compare options. Get ranked recommendations backed by multiple independent AI judges.{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:site_name" content="DecideIQ">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block tw_title %}DecideIQ — AI-Powered Decision Intelligence{% endblock %}">
  <meta name="twitter:description" content="Compare options. Get ranked recommendations backed by AI judges.">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f0fdf4', 100:'#dcfce7', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534', 900:'#14532d' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .score-bar { transition: width 0.6s ease-out; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="border-b bg-white/80 backdrop-blur sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="font-bold text-lg tracking-tight">Decide<span class="text-brand-600">IQ</span></a>
      <a href="/decide" class="text-sm font-medium px-4 py-2 rounded-lg bg-brand-600 text-white hover:bg-brand-700 transition">Try it free</a>
    </div>
  </nav>

  <!-- Content -->
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t bg-white mt-16">
    <div class="max-w-5xl mx-auto px-4 py-8 text-center text-sm text-gray-500">
      <p>DecideIQ — AI-powered decision intelligence. Multiple independent AI judges evaluate your options blindly.</p>
      <p class="mt-2">&copy; 2026 DecideIQ. All rights reserved.</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
