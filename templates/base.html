<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}Decision Intelligence{% endblock %} | DecideIQ</title>
<meta name="description" content="{% block meta_desc %}Compare options with AI-powered blind analysis. Multiple independent analysts rank your choices.{% endblock %}">
<meta property="og:title" content="{% block og_title %}DecideIQ — Compare options. Make smarter decisions.{% endblock %}">
<meta property="og:description" content="{% block og_desc %}AI-powered blind comparison. Independent analysts rank your options.{% endblock %}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:site_name" content="DecideIQ">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2696;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1e1f23;--surface:#262730;--surface2:#2d2e38;--surface3:#353640;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.14);
  --text:#f4f3f0;--text2:#d0cdc6;--text3:#9b968e;--text4:#6b6760;
  --accent:#4dd0c8;--accent-dim:rgba(77,208,200,0.10);--accent-border:rgba(77,208,200,0.22);--accent2:#3bbab3;
  --green:#4ade80;--green-dim:rgba(74,222,128,0.10);
  --red:#f87171;--red-dim:rgba(248,113,113,0.08);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.55;min-height:100%;display:flex;flex-direction:column}
.fd{font-family:'Newsreader',Georgia,serif}
.fm{font-family:'JetBrains Mono',monospace}

/* Grain */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.012;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Progress circle */
.pc{width:52px;height:52px;position:relative;flex-shrink:0}
.pc svg{width:100%;height:100%;transform:rotate(-90deg)}
.pc .trk{fill:none;stroke:var(--border2);stroke-width:3}
.pc .fl{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1)}
.pc .fl.done{stroke:var(--green)}
.pc .pv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text)}

/* Score bar */
.sb{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;position:relative}
.sf{height:100%;border-radius:3px;width:0;transition:width 1.2s cubic-bezier(0.22,1,0.36,1);position:relative}
.sf::after{content:'';position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.18) 50%,transparent 100%);animation:shine 1.4s ease-in-out 1.6s}
@keyframes shine{0%{opacity:0;transform:translateX(-100%)}50%{opacity:1}100%{opacity:0;transform:translateX(100%)}}

/* Badges */
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:4px;font-weight:600;letter-spacing:0.2px}
.bdg-a{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border)}
.bdg-g{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,0.18)}
.bdg-r{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.12)}
.bdg-m{background:rgba(138,133,125,0.08);color:var(--text2);border:1px solid var(--border)}

/* Metric card */
.mc{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.mc-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:5px}
.mc-b{height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-bottom:4px}
.mc-f{height:100%;border-radius:2px;width:0;transition:width 1.5s cubic-bezier(0.22,1,0.36,1) 0.3s}
.mc-v{font-size:15px;font-weight:700;color:var(--text)}

/* Winner card */
.wc{background:var(--surface);border:1px solid var(--accent-border);border-radius:12px;box-shadow:0 0 80px -16px rgba(77,208,200,0.06)}

/* Reveal */
.rv{opacity:0;transform:translateY(10px);animation:rvUp 0.45s ease-out forwards}
.rv1{animation-delay:0.08s}.rv2{animation-delay:0.16s}.rv3{animation-delay:0.24s}
@keyframes rvUp{to{opacity:1;transform:translateY(0)}}

/* Step icon */
.si{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.si-r{border:2px solid var(--accent);animation:sip 1.5s infinite}
.si-d{background:var(--green);color:var(--bg)}
@keyframes sip{0%,100%{opacity:1}50%{opacity:0.3}}

/* Range */
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;height:20px}
input[type=range]::-webkit-slider-track{height:3px;background:var(--border2);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);margin-top:-5.5px;border:2px solid var(--bg)}
input[type=range]::-moz-range-track{height:3px;background:var(--border2);border-radius:2px;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}

/* Chip */
.chip{display:inline-block;font-size:11px;padding:4px 10px;border-radius:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.chip:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}

/* Mobile */
@media(max-width:640px){
  .mg3{grid-template-columns:1fr !important}
  .hm{display:none !important}
}
</style>
{% block head %}{% endblock %}
</head>
<body>

<nav style="border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(30,31,35,0.92);backdrop-filter:blur(12px)">
  <div style="max-width:680px;margin:0 auto;padding:0 16px;height:44px;display:flex;align-items:center">
    <a href="/" style="font-weight:700;font-size:15px;color:var(--text);text-decoration:none;flex:1">
      <span class="fd">Decide</span><span style="color:var(--accent)">IQ</span>
    </a>
  </div>
</nav>

<main style="flex:1">{% block content %}{% endblock %}</main>

<footer style="border-top:1px solid var(--border);margin-top:60px">
  <div style="max-width:680px;margin:0 auto;padding:16px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text4)">
    <span class="fd" style="font-weight:600;color:var(--text3)">Decide<span style="color:rgba(77,208,200,0.35)">IQ</span></span>
    <div style="display:flex;gap:14px"><a href="/privacy" style="color:var(--text4);text-decoration:none">Privacy</a><a href="/terms" style="color:var(--text4);text-decoration:none">Terms</a></div>
  </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
