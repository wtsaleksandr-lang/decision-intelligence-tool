<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Decision Intelligence{% endblock %} | DecideIQ</title>
<meta name="description" content="{% block meta_desc %}Compare options with AI-powered blind analysis. Multiple independent judges rank your choices with scores, risks, and confidence.{% endblock %}">
<meta property="og:title" content="{% block og_title %}DecideIQ — Compare options. Make smarter decisions.{% endblock %}">
<meta property="og:description" content="{% block og_desc %}AI-powered blind comparison. Multiple judges rank your options.{% endblock %}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:site_name" content="DecideIQ">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2696;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0b0a; --surface: #171615; --surface2: #1e1d1b;
  --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
  --text: #d6d3cd; --text-muted: #7c7872; --text-dim: #4a4641;
  --amber: #e8a631; --amber-dim: rgba(232,166,49,0.12); --amber-border: rgba(232,166,49,0.18);
  --green: #3fb950; --green-dim: rgba(63,185,80,0.12);
  --red: #f85149; --red-dim: rgba(248,81,73,0.10);
  --blue: #58a6ff; --blue-dim: rgba(88,166,255,0.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.55}
.font-display{font-family:'Newsreader',Georgia,serif}
.font-mono{font-family:'JetBrains Mono',monospace}

/* Grain */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Progress circle (ported from Orchestrator) */
.prog-circle{width:48px;height:48px;position:relative;flex-shrink:0}
.prog-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.prog-circle .track{fill:none;stroke:var(--border2);stroke-width:3}
.prog-circle .fill{fill:none;stroke:var(--amber);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1)}
.prog-circle .fill.done{stroke:var(--green)}
.prog-circle .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text)}

/* Score bars (premium shimmer) */
.score-bar-wrap{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;position:relative}
.score-bar-fill{height:100%;border-radius:3px;width:0;transition:width 1.4s cubic-bezier(0.22,1,0.36,1);position:relative}
.score-bar-fill::after{content:'';position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.25) 50%,transparent 100%);animation:barShine 1.5s ease-in-out 1.8s}
@keyframes barShine{0%{opacity:0;transform:translateX(-100%)}50%{opacity:1}100%{opacity:0;transform:translateX(100%)}}

/* Badges (ported from Orchestrator) */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;letter-spacing:0.3px}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(63,185,80,0.2)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,81,73,0.15)}
.badge-muted{background:rgba(124,120,114,0.08);color:var(--text-muted);border:1px solid var(--border)}

/* Metric cards (ported from Orchestrator consensus block) */
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.metric-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:6px}
.metric-bar{height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-bottom:4px}
.metric-fill{height:100%;border-radius:2px;width:0;transition:width 1.5s cubic-bezier(0.22,1,0.36,1) 0.3s}
.metric-value{font-size:14px;font-weight:700}

/* Panel (Orchestrator .panel equivalent) */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}

/* Glass card with amber glow */
.winner-card{background:var(--surface);border:1px solid var(--amber-border);border-radius:10px;
  box-shadow:0 0 60px -12px rgba(232,166,49,0.08),0 0 120px -24px rgba(232,166,49,0.04)}

/* Reveal animations */
.reveal{opacity:0;transform:translateY(12px);animation:revealUp 0.5s ease-out forwards}
.reveal-d1{animation-delay:0.1s}.reveal-d2{animation-delay:0.2s}.reveal-d3{animation-delay:0.3s}.reveal-d4{animation-delay:0.4s}
@keyframes revealUp{to{opacity:1;transform:translateY(0)}}

/* Step icon (ported from Orchestrator) */
.step-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.step-pending{border:2px solid var(--border2)}
.step-running{border:2px solid var(--amber);animation:stepPulse 1.5s infinite}
.step-done{background:var(--green);color:var(--bg)}
@keyframes stepPulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Custom range */
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;height:20px}
input[type=range]::-webkit-slider-track{height:3px;background:var(--border2);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--amber);margin-top:-5.5px;border:2px solid var(--bg);transition:transform 0.15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type=range]::-moz-range-track{height:3px;background:var(--border2);border-radius:2px;border:none}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--amber);border:2px solid var(--bg)}

/* Accordion */
details summary{cursor:pointer;list-style:none}
details summary::-webkit-details-marker{display:none}
details[open] .chevron{transform:rotate(180deg)}
.chevron{transition:transform 0.2s ease}

/* Focus & input styling */
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--amber) !important}

/* Mobile */
@media(max-width:640px){
  .metric-grid-3{grid-template-columns:1fr !important}
  .hide-mobile{display:none !important}
}
</style>
{% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col" style="min-height:100vh;display:flex;flex-direction:column">

<!-- Nav -->
<nav style="border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(12,11,10,0.85);backdrop-filter:blur(12px)">
  <div style="max-width:720px;margin:0 auto;padding:0 20px;height:44px;display:flex;align-items:center;justify-content:between">
    <a href="/" style="font-weight:700;font-size:15px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:6px;flex:1">
      <span style="font-family:'Newsreader',serif">Decide</span><span style="color:var(--amber)">IQ</span>
      <span class="hide-mobile" style="margin-left:12px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px">blind multi-judge analysis</span>
    </a>
    <a href="/#tool" style="font-size:10px;font-weight:600;padding:5px 14px;border-radius:5px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border);text-decoration:none;letter-spacing:0.8px;text-transform:uppercase;transition:background 0.15s"
       onmouseover="this.style.background='rgba(232,166,49,0.2)'" onmouseout="this.style.background='var(--amber-dim)'">Analyze</a>
  </div>
</nav>

<main style="flex:1">{% block content %}{% endblock %}</main>

<!-- Footer -->
<footer style="border-top:1px solid var(--border);margin-top:80px">
  <div style="max-width:720px;margin:0 auto;padding:20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;font-size:11px;color:var(--text-dim)">
    <div><span style="font-family:'Newsreader',serif;font-weight:600;color:var(--text-muted)">Decide</span><span style="color:rgba(232,166,49,0.4)">IQ</span></div>
    <div style="display:flex;gap:16px">
      <a href="/privacy" style="color:var(--text-dim);text-decoration:none">Privacy</a>
      <a href="/terms" style="color:var(--text-dim);text-decoration:none">Terms</a>
    </div>
  </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
